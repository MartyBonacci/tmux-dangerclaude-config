# ═══════════════════════════════════════════════════════════════════════════
# Tmux config optimized for multi-device Claude Code workflow
# Desktop is the persistence anchor; laptop + phone (via Termux over Tailscale)
# attach/detach as clients. Sessions outlive every network drop.
# ═══════════════════════════════════════════════════════════════════════════

# ─── Prefix: Ctrl+Space ────────────────────────────────────────────────────
# Default Ctrl+b is awkward on Termux touch keyboards. Ctrl+Space is
# unused elsewhere and thumb-friendly with volume-down-as-Ctrl.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── Terminal capabilities ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"       # true-color (24-bit)

# ─── History and responsiveness ────────────────────────────────────────────
set -g history-limit 50000                       # big scrollback for claude sessions
set -sg escape-time 10                           # no laggy escape in vi-mode / claude

# ─── Mouse + multi-client sizing ───────────────────────────────────────────
set -g mouse on
set -g aggressive-resize on                      # windows resize to actively-viewing client

# ─── Window/pane numbering (reachable keys) ────────────────────────────────
set -g base-index 1                              # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on                       # close a window, others renumber

# ─── Activity monitoring ───────────────────────────────────────────────────
setw -g monitor-activity on                      # highlight windows with output
set -g visual-activity off                       # no bell, just the indicator

# ─── Copy mode in vi style ─────────────────────────────────────────────────
setw -g mode-keys vi

# ─── Reload binding ────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# ─── More intuitive split bindings (split in current dir) ──────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Status bar: useful, phone-readable, top-positioned ────────────────────
# Top position avoids being hidden under Termux's on-screen keyboard.
set -g status-position top
set -g status-interval 5                         # refresh every 5s (time display)
set -g status-bg colour235
set -g status-fg colour245
set -g status-left-length 40
set -g status-right-length 60
set -g status-left  '#[fg=green,bold] ❱ #S #[fg=colour245]│ '
set -g status-right '#[fg=colour245]#(whoami)@#h │ #[fg=colour111]%a %H:%M '
setw -g window-status-current-style 'fg=colour223,bg=colour238,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '
setw -g window-status-activity-style 'fg=yellow,bg=colour235,bold'

# ═══════════════════════════════════════════════════════════════════════════
# Plugins (managed by TPM — https://github.com/tmux-plugins/tpm)
# Install/update: prefix + I  (that's Ctrl-Space then Shift+i)
# Update existing: prefix + U
# Remove removed:  prefix + alt+u
# ═══════════════════════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # universally-good defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto-save every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'          # better system clipboard integration

# Resurrect + continuum settings
set -g @continuum-restore 'on'                   # auto-restore last save on tmux start
set -g @continuum-save-interval '15'             # save every 15 minutes
set -g @resurrect-capture-pane-contents 'on'     # restore scrollback too
set -g @resurrect-strategy-vim 'session'         # restore vim sessions if present

# ─── Initialize TPM (must be the last line) ────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
